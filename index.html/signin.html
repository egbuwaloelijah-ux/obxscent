<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OBXSCENT – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #1c0379;
      --orange-dark: #360892;
      --orange-light: #fff4e6;
      --text: #222;
      --muted: #888;
      --border: #e0e0e0;
      --bg: #f5f5f5;
      --white: #fff;
      --radius: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 480px;
      padding: 40px 36px 32px;
      animation: fadeUp 0.45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .star-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }
    .star-circle {
      width: 62px; height: 62px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(246,139,30,0.35);
    }
    .star-circle svg { width: 32px; height: 32px; fill: #fff; }

    h1 {
      text-align: center;
      font-size: 1.55rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      margin-bottom: 28px;
    }

    .field {
      position: relative;
      margin-bottom: 18px;
    }
    .field label {
      position: absolute;
      top: 50%;
      left: 14px;
      transform: translateY(-50%);
      font-size: 0.88rem;
      color: var(--muted);
      pointer-events: none;
      transition: 0.2s ease;
      background: var(--white);
      padding: 0 4px;
    }
    .field input {
      width: 100%;
      height: 52px;
      border: 1.8px solid var(--border);
      border-radius: var(--radius);
      padding: 0 44px 0 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.97rem;
      color: var(--text);
      background: transparent;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--orange); }
    .field input:focus + label,
    .field input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 0.78rem;
      color: var(--orange);
    }

    .eye-btn {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 0;
    }
    .eye-btn:hover { color: var(--orange); }

    .forgot-row {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 22px;
    }
    .forgot-row a {
      font-size: 0.83rem;
      color: var(--orange);
      text-decoration: none;
      font-weight: 700;
    }
    .forgot-row a:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      height: 52px;
      background: var(--orange);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      box-shadow: 0 3px 14px rgba(246,139,30,0.28);
    }
    .btn-primary:hover  { background: var(--orange-dark); box-shadow: 0 5px 18px rgba(246,139,30,0.38); }
    .btn-primary:active { transform: scale(0.98); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0;
      color: var(--muted);
      font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .social-row {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
    }
    .btn-social {
      flex: 1;
      height: 46px;
      border: 1.8px solid var(--border);
      border-radius: var(--radius);
      background: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      transition: border-color 0.18s, background 0.18s;
    }
    .btn-social:hover { border-color: var(--orange); background: var(--orange-light); }

    .terms {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .terms a { color: var(--orange); text-decoration: none; font-weight: 700; }
    .terms a:hover { text-decoration: underline; }

    .signup-row {
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
    }
    .signup-row a { color: var(--orange); font-weight: 800; text-decoration: none; }
    .signup-row a:hover { text-decoration: underline; }

    .help {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 20px;
    }
    .help a { color: var(--orange); text-decoration: none; font-weight: 700; }

    .brand-footer {
      margin-top: 24px;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: 1px;
    }
    .brand-footer .dot { color: var(--orange); font-size: 1.6rem; line-height: 0; vertical-align: middle; }
  </style>
</head>
<body>

  <div class="card">

    <div class="star-wrap">
      <div class="star-circle">
        <img src="perfume-svgrepo-com.svg" alt="perfume-svgrepo-com" width="50">
</svg>

          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14 2 9.27l6.91-1.01z"/>
        </svg>
      </div>
    </div>

    <h1>Welcome to OBXSCENT🥳</h1>
    <p class="subtitle">Sign in to your account to continue</p>

    <div class="field">
      <input type="text" id="identifier" placeholder=" " autocomplete="username"/>
      <label for="identifier">Email or Mobile Number</label>
    </div>

    <div class="field">
      <input type="password" id="password" placeholder=" " autocomplete="current-password"/>
      <label for="password">Password</label>
      <button class="eye-btn" type="button" onclick="togglePwd(this)" aria-label="Show password">
      
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle class="eye-open" cx="12" cy="12" r="3"/>
          <line class="eye-slash" x1="1" y1="1" x2="23" y2="23" style="display:none"/>
        </svg>
      </button>
    </div>

    <div class="forgot-row"><a href="#">Forgot password?</a></div>

    <button class="btn-primary" type="button">Sign In</button>

    <div class="divider">Or sign in with</div>

    <div class="social-row">
      <button class="btn-social">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.88v2.26h3.32l-.53 3.5h-2.79V24C19.61 23.1 24 18.1 24 12.07z"/>
        </svg>
        Facebook
      </button>
      <button class="btn-social">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Google
      </button>
    </div>

    <p class="terms">
      By continuing you agree to OBXSCENT's
      <a href="#">Terms &amp; Conditions</a> &amp; <a href="#">Privacy Policy</a>
    </p>

    <p class="signup-row">Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>

  <p class="help">Need help? Visit our <a href="#">Help Center</a> or call 234 810 610 1566</p>
  <div class="brand-footer">OBXSCENT🥳<span class="dot">●</span></div>

  <script>
    function togglePwd(btn) {
      const input = btn.closest('.field').querySelector('input');
      const open  = btn.querySelectorAll('.eye-open');
      const slash = btn.querySelector('.eye-slash');
      if (input.type === 'password') {
        input.type = 'text';
        open.forEach(el => el.style.display = 'none');
        slash.style.display = '';
      } else {
        input.type = 'password';
        open.forEach(el => el.style.display = '');
        slash.style.display = 'none';
      }
    }
  </script>
</body>
</html>
